server:
  port: 8100

spring:
  application:
    name: ai-gateway-service
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.ai.gateway: INFO
    org.springframework.ai: DEBUG
