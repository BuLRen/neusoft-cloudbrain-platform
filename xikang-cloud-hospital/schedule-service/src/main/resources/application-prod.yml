# 生产环境配置（部署到 182.92.193.45，方案 B：单机模式不走 gateway/Nacos）
# 用法：java -jar schedule-service.jar --spring.profiles.active=prod
#
# 数据库 / Dify key 等敏感配置都从同目录 .env 文件读，避免重复配置
# 关闭 Nacos 服务发现 + 配置中心，schedule-service 单机运行

server:
  port: 8095

spring:
  # ===== 彻底排除 Nacos 自动配置类（关键！）=====
  # 这会阻止 Spring Boot 加载 Nacos 的所有 AutoConfiguration 类
  # 包括 NacosDiscoveryAutoConfiguration / NacosServiceRegistryAutoConfiguration 等
  # 这些类里包含触发 register() 的监听器，必须从源头排除
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosServiceRegistryAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryClientConfiguration
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.endpoint.NacosConfigEndpointAutoConfiguration
      - com.alibaba.cloud.nacos.endpoint.NacosDiscoveryEndpointAutoConfiguration
      - com.alibaba.cloud.nacos.loadbalancer.LoadBalancerNacosAutoConfiguration
      - com.alibaba.cloud.nacos.util.UtilIPv4AutoConfiguration
      - org.springframework.cloud.client.serviceregistry.ServiceRegistryAutoConfiguration
      - org.springframework.cloud.client.serviceregistry.AutoServiceRegistrationAutoConfiguration

  # 关闭 bootstrap 阶段对 Nacos 的依赖
  cloud:
    bootstrap:
      enabled: false
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
    service-registry:
      auto-registration:
        enabled: false
    config:
      import:
        - optional:file:../.env
        - optional:file:./.env

  # 数据库：从 .env 读取（DB_HOST / DB_PORT / DB_NAME / DB_USERNAME / DB_PASSWORD）
  # 和 remote profile 用同一套变量，确保切换 profile 不会丢数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:43.139.102.203}:${DB_PORT:5432}/${DB_NAME:xikang_hospital}?tcpKeepAlive=true
    username: ${DB_USERNAME:xikang_hospital}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 0
      max-lifetime: 1740000
      keepalive-time: 60000
      leak-detection-threshold: 60000

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.schedule.entity
  configuration:
    map-underscore-to-camel-case: true

# Dify 配置（key 从 .env 读，避免硬编码）
dify:
  api-key: ${DIFY_API_KEY_SCHEDULE:}
  base-url: ${DIFY_BASE_URL_SCHEDULE:http://43.139.102.203}
  timeout-ms: ${DIFY_TIMEOUT_MS:660000}
  leave-adjust-api-key: ${DIFY_LEAVE_ADJUST_API_KEY:}
  callback-token: ${DIFY_CALLBACK_TOKEN:schedule-internal-2026}

# 号源预警阈值
quota:
  alert:
    threshold: 0.2
    min-available: 10

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.schedule: INFO
    root: INFO
