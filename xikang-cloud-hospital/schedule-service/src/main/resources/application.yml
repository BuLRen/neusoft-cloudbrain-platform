server:
  port: 8095

spring:
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
  application:
    name: schedule-service

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.schedule.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

# Dify 配置（替代原 Coze）
dify:
  api-key: ${DIFY_API_KEY:}                              # 必填，格式 app-xxxx
  base-url: ${DIFY_BASE_URL:http://43.139.102.203}       # Dify 部署地址
  timeout-ms: ${DIFY_TIMEOUT_MS:660000}                  # blocking 模式下要够长（11 分钟，覆盖月度排班 10 分钟上限）

# 号源预警阈值
quota:
  alert:
    threshold: 0.2
    min-available: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.schedule: INFO