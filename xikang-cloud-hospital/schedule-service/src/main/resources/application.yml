server:
  port: 8095

spring:
  config:
    import: optional:file:../.env
  application:
    name: schedule-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:3307/xikang_hospital
    username: postgres
    password: postgres123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.schedule.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Coze 配置
coze:
  api-key: ${COZE_API_KEY:}
  workflow-id: ${COZE_WORKFLOW_ID:}
  api-url: ${COZE_API_URL:https://api.coze.cn}
  timeout-ms: ${COZE_TIMEOUT_MS:300000}

# 号源预警阈值
quota:
  alert:
    threshold: 0.2
    min-available: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.schedule: DEBUG