server:
  port: 8095

spring:
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
  application:
    name: schedule-service

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.schedule.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

# Dify 配置（智能排班专用，替代原 Coze）
dify:
  api-key: ${DIFY_API_KEY_SCHEDULE:}                     # 必填，格式 app-xxxx；读 .env 中的排班专用 key
  base-url: ${DIFY_BASE_URL_SCHEDULE:http://43.139.102.203}  # Dify 部署地址（勿带 /v1，代码会自动拼）
  timeout-ms: ${DIFY_TIMEOUT_MS:660000}                  # blocking 模式下要够长（11 分钟，覆盖月度排班 10 分钟上限）
  leave-adjust-api-key: ${DIFY_LEAVE_ADJUST_API_KEY:}   # 替班工作流独立 API Key（为空时回退到 api-key）
  callback-token: ${DIFY_CALLBACK_TOKEN:schedule-internal-2026}  # Dify HTTP 节点回调简单鉴权 token

# 通知服务集成（写消息：医生变更/请假审批等）
notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:}                    # 留空则走 Nacos 服务发现（推荐）
  internal-token: ${NOTIF_INTERNAL_TOKEN:notif-internal-2026}  # 内部调用鉴权 token（与 notification-service 配置一致）

# Feign 超时（避免 notification-service 挂时拖垮主流程）
feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
      notification-service:
        connect-timeout: 2000
        read-timeout: 4000

# 号源预警阈值
quota:
  alert:
    threshold: 0.2
    min-available: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.schedule: INFO