# =============================================================================
# 熙康云医院 - 共享数据库配置（classpath 默认，可被 config/database.yml 覆盖）
# =============================================================================
# 默认连接：远程 PostgreSQL（43.139.102.203:5432）
# 远程密码：在项目根目录 .env 中设置 DB_REMOTE_PASSWORD
# 切回本地 Docker：启动加 -Dspring.profiles.active=local
# =============================================================================

spring:
  profiles:
    active: remote

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:3307/xikang_hospital
    username: postgres
    password: postgres123
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

---
spring:
  config:
    activate:
      on-profile: remote
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://43.139.102.203:5432/xikang_hospital
    username: xikang_hospital
    password: ${DB_REMOTE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 3          # 远程开发可再降到 2
      minimum-idle: 1               # 不要维持大量空闲连接
      connection-timeout: 10000     # 10s 拿不到连接就失败，便于发现问题
      idle-timeout: 300000          # 5 分钟空闲就回收
      max-lifetime: 1800000         # 30 分钟强制换新连接（应小于 PG 侧 timeout）
      keepalive-time: 30000         # 远程连接保活，防 NAT/防火墙断连
      leak-detection-threshold: 60000  # 开发环境：60s 未归还连接打 WARN 日志
