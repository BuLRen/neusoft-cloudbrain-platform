# =============================================================================
# 数据源：连接参数与 local/remote 切换见 xikang-cloud-hospital/.env
#   SPRING_PROFILES_ACTIVE=remote | local
# =============================================================================
server:
  port: 8093

spring:
  application:
    name: medtech-service
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.medtech.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:

    com.xikang.medtech: DEBUG

services:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8096}
  ct-viewer-service:
    url: ${CT_VIEWER_SERVICE_URL:http://localhost:8099}
    internal-token: ${INTERNAL_SERVICE_TOKEN:${INTERNAL_AI_TOKEN:}}
    connect-timeout-ms: ${CT_VIEWER_CONNECT_TIMEOUT_MS:30000}
    # AI 肺结节 nnU-Net CPU 推理可能超过 10 分钟，需与 ct-viewer lung-nodule read-timeout 对齐
    read-timeout-ms: ${CT_VIEWER_READ_TIMEOUT_MS:1800000}

# =============================================================================
# 业务配置：Dify AI 工作流（模拟检查/检验）
# =============================================================================
#
# 调用方式：POST {DIFY_BASE_URL}/v1/workflows/run，Header: Authorization: Bearer {app-xxx}
# 注意：base-url 只写到主机（和端口），不要带 /v1
#
# 与 physician-service 共用 DIFY_ENABLED / DIFY_BASE_URL（自托管云服务器）
# 初步诊断在 physician-service 中单独走 DIFY_BASE_URL_PRELIMINARY（官网），此处不涉及
#
# 开关：workflow-check-simulate 填 true/1/yes/on；勿将 app-xxx 写在此项
# 未启用或调用失败时走内置 CheckSimulationFallbackEngine
# =============================================================================
xikang:
  internal:
    ai:
      token: ${INTERNAL_AI_TOKEN:}
  physician:
    base-url: ${PHYSICIAN_SERVICE_URL:http://localhost:8092}
    w3-auto-trigger-enabled: ${W3_AUTO_TRIGGER_ENABLED:true}
  ai:
    dify:
      enabled: ${DIFY_ENABLED:true}
      base-url: ${DIFY_BASE_URL:http://localhost}
      # ----- 模拟检查/检验（医技 · 检查与检验共用同一 Workflow App）-----
      workflow-check-simulate: ${DIFY_WORKFLOW_CHECK_SIMULATE:true}
      api-key-check-simulate: ${DIFY_API_KEY_CHECK_SIMULATE:${DIFY_API_KEY_SIMULATE:}}
      connect-timeout-ms: ${DIFY_CONNECT_TIMEOUT_MS:30000}
      read-timeout-ms: ${DIFY_READ_TIMEOUT_MS:600000}
      ct-inference-url: ${CT_INFERENCE_URL:}
      check-simulate-output-keys:
        values-root: ${DIFY_CHECK_SIM_OUTPUT_VALUES:simulatedValues}
        result-text: ${DIFY_CHECK_SIM_OUTPUT_TEXT:resultText}
        structured-output: ${DIFY_CHECK_SIM_OUTPUT_STRUCTURED:structured_output}
      # ----- 随访 · 病例总结 / 医疗 AI 对话 -----
      workflow-follow-up-case-summary: ${DIFY_WORKFLOW_FOLLOW_UP_CASE_SUMMARY:true}
      api-key-follow-up-case-summary: ${DIFY_API_KEY_FOLLOW_UP_CASE_SUMMARY:}
      workflow-follow-up-medical-chat: ${DIFY_WORKFLOW_FOLLOW_UP_MEDICAL_CHAT:true}
      api-key-follow-up-medical-chat: ${DIFY_API_KEY_FOLLOW_UP_MEDICAL_CHAT:}
      workflow-follow-up-shift-schedule: ${DIFY_WORKFLOW_FOLLOW_UP_SHIFT_SCHEDULE:true}
      api-key-follow-up-shift-schedule: ${DIFY_API_KEY_FOLLOW_UP_SHIFT_SCHEDULE:}
      workflow-follow-up-enqueue: ${DIFY_WORKFLOW_FOLLOW_UP_ENQUEUE:true}
      api-key-follow-up-enqueue: ${DIFY_API_KEY_FOLLOW_UP_ENQUEUE:}
      # ----- 危急值 AI 识别（影像/文本型结果兜底）-----
      workflow-critical-value-detect: ${DIFY_WORKFLOW_CRITICAL_VALUE_DETECT:}
      api-key-critical-value-detect: ${DIFY_API_KEY_CRITICAL_VALUE_DETECT:}

# =============================================================================
# 随访数据源：demo=仅模拟表 | production=仅 A/C 类生产数据 | hybrid=真实患者+模拟指标回退
# =============================================================================
follow-up:
  data-source: ${FOLLOW_UP_DATA_SOURCE:production}

# =============================================================================
# 血糖 LSTM 预测微服务（Python FastAPI :8107）
# =============================================================================
glucose-prediction:
  base-url: ${GLUCOSE_PREDICTION_BASE_URL:http://127.0.0.1:8107}
  connect-timeout-ms: 5000
  read-timeout-ms: 15000

