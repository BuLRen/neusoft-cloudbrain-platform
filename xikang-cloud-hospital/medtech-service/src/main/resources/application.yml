server:
  port: 8093

spring:
  application:
    name: medtech-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:3307/xikang_hospital
    username: postgres
    password: postgres123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.medtech.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.medtech: DEBUG

xikang:
  ai:
    dify:
      enabled: ${DIFY_ENABLED:true}
      base-url: ${DIFY_BASE_URL:http://localhost}
      api-key-check-simulate: ${DIFY_API_KEY_CHECK_SIMULATE:${DIFY_API_KEY_SIMULATE:app-YpflvlBmahrZK9QycNUnq62m}}
      workflow-check-simulate: ${DIFY_WORKFLOW_CHECK_SIMULATE:true}
      connect-timeout-ms: ${DIFY_CONNECT_TIMEOUT_MS:30000}
      read-timeout-ms: ${DIFY_READ_TIMEOUT_MS:300000}
      ct-inference-url: ${CT_INFERENCE_URL:}
      check-simulate-output-keys:
        values-root: ${DIFY_CHECK_SIM_OUTPUT_VALUES:simulatedValues}
        result-text: ${DIFY_CHECK_SIM_OUTPUT_TEXT:resultText}
        structured-output: ${DIFY_CHECK_SIM_OUTPUT_STRUCTURED:structured_output}
