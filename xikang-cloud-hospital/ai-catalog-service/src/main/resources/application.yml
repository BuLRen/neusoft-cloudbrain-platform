# =============================================================================
# ai-catalog-service — Dify HTTP 节点疾病/药品库检索（云侧与 Dify 同机部署）
# =============================================================================

server:
  port: 8098

spring:
  application:
    name: ai-catalog-service
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: false
        register-enabled: false
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: false
    service-registry:
      auto-registration:
        enabled: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

xikang:
  internal:
    ai:
      token: ${INTERNAL_AI_TOKEN:}
