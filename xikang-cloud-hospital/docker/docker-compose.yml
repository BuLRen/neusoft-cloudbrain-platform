name: xikang-cloud-hospital

services:
  # PostgreSQL 数据库 - 端口 3307
  postgres:
    image: postgres:16-alpine
    container_name: xikang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xikang_hospital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      TZ: Asia/Shanghai
    ports:
      - "3307:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 服务发现与配置中心 - 端口 8848
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: xikang-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 512m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nacos_data:
  nacos_logs:
