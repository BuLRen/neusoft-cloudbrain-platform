# =============================================================================
# 数据源：默认连远程 PostgreSQL（43.139.102.203:5432），由 config/database.yml 提供
# 远程密码见项目根目录 .env 中的 DB_REMOTE_PASSWORD
# 切回本地 Docker：启动加 -Dspring.profiles.active=local
# =============================================================================
server:
  port: 8094

spring:
  profiles:
    active: remote
  application:
    name: pharmacy-service
  config:
    import:
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.pharmacy.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.pharmacy: INFO

services:
  ai-pharmacy:
    base-url: http://localhost:8104
