# =============================================================================
# 数据源：连接参数与 local/remote 切换见 xikang-cloud-hospital/.env
#   SPRING_PROFILES_ACTIVE=remote | local
# =============================================================================
server:
  port: 8094

spring:
  application:
    name: pharmacy-service
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yaml

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.pharmacy.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.pharmacy: INFO

services:
  ai-pharmacy:
    # 留空走 Nacos 服务发现；本地单机调试可设 AI_PHARMACY_SERVICE_URL=http://localhost:8104
    url: ${AI_PHARMACY_SERVICE_URL:}
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://127.0.0.1:8096}

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
