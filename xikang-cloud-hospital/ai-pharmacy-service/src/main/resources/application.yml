server:
  port: 8104

spring:
  application:
    name: ai-pharmacy-service
  config:
    import:
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
      - optional:file:../.env
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-api-key}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.ai.pharmacy.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.ai.pharmacy: INFO
    org.springframework.ai: DEBUG
