server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: registration-service
          uri: lb://registration-service
          predicates:
            - Path=/api/registration/**
        - id: physician-service
          uri: lb://physician-service
          predicates:
            - Path=/api/physician/**
        - id: medtech-service
          uri: lb://medtech-service
          predicates:
            - Path=/api/medtech/**
        - id: pharmacy-service
          uri: lb://pharmacy-service
          predicates:
            - Path=/api/pharmacy/**
        - id: ai-triage-service
          uri: lb://ai-triage-service
          predicates:
            - Path=/api/ai/triage/**
        - id: ai-consult-service
          uri: lb://ai-consult-service
          predicates:
            - Path=/api/ai/consult/**
        - id: ai-diagnosis-service
          uri: lb://ai-diagnosis-service
          predicates:
            - Path=/api/ai/diagnosis/**
        - id: ai-pharmacy-service
          uri: lb://ai-pharmacy-service
          predicates:
            - Path=/api/ai/pharmacy/**
        - id: ai-gateway-service
          uri: lb://ai-gateway-service
          predicates:
            - Path=/api/ai/route/**
        - id: ai-gateway-status
          uri: lb://ai-gateway-service
          predicates:
            - Path=/api/ai/status
        - id: ai-triage-websocket
          uri: lb://ai-triage-service
          predicates:
            - Path=/ws/voice
        - id: voice-service
          uri: lb://ai-triage-service
          predicates:
            - Path=/api/voice/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

jwt:
  # 开发环境默认值；生产环境请通过环境变量/配置中心覆盖
  secret: xikang-cloud-hospital-secret-key-for-jwt-token-generation
  defaultExpirationMs: 86400000
