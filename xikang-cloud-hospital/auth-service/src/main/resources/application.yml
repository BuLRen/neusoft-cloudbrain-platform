server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:3307/xikang_hospital
    username: postgres
    password: postgres123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.auth: DEBUG

jwt:
  # 开发环境默认值；生产环境请通过环境变量/配置中心覆盖
  secret: xikang-cloud-hospital-secret-key-for-jwt-token-generation
  defaultExpirationMs: 86400000
  accessExpirationMs: 900000
  refreshExpirationMs: 604800000
