# =============================================================================
# 数据源：连接参数与 local/remote 切换见 xikang-cloud-hospital/.env
#   SPRING_PROFILES_ACTIVE=remote | local
# =============================================================================
server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1
      timeout: 5000ms

captcha:
  ttl-seconds: 180
  length: 4

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 关闭 SQL 打印，调试时取消注释

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.auth: INFO

jwt:
  # 开发环境默认值；生产环境请通过环境变量/配置中心覆盖
  secret: xikang-cloud-hospital-secret-key-for-jwt-token-generation
  defaultExpirationMs: 86400000
  accessExpirationMs: 7200000
  refreshExpirationMs: 604800000
