server:
  port: 8092

spring:
  application:
    name: physician-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:3307/xikang_hospital
    username: postgres
    password: postgres123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.physician.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.physician: DEBUG

xikang:
  ai:
    dify:
      # 总开关；真正调用 Dify 还需配置 api-key（每个 Workflow App 一个 app-xxx，见控制台「访问 API」）
      enabled: ${DIFY_ENABLED:true}
      base-url: ${DIFY_BASE_URL:https://api.dify.ai}
      # 与文档 curl 中 Authorization: Bearer {api_key} 相同，不要写在 workflow-preliminary 里
      api-key: ${DIFY_API_KEY:app-GfJeWsUbsiHyusuRF7znNBul}
      # W1–W4：非空表示尝试 Dify（与 preliminary 共用同一 api-key 时会命中同一 App）
      workflow-w1: ${DIFY_WORKFLOW_W1:}
      # 填 true/1 启用 W2 Dify（检查推荐）；API Key 用 api-key-w2（独立 App）或回退 api-key
      workflow-w2: ${DIFY_WORKFLOW_W2:true}
      api-key-w2: ${DIFY_API_KEY_W2:app-XJXSvs3Z3jW4KqPAtK0B7Tcm}
      workflow-w2b: ${DIFY_WORKFLOW_W2B:}
      workflow-w3: ${DIFY_WORKFLOW_W3:}
      workflow-w4: ${DIFY_WORKFLOW_W4:}
      # 初步诊断开关：填 true/1 即可；不是 workflow id，也不是 app-xxx（Dify 请求体里无 workflow 字段）
      workflow-preliminary: ${DIFY_WORKFLOW_PRELIMINARY:true}
      connect-timeout-ms: ${DIFY_CONNECT_TIMEOUT_MS:30000}
      read-timeout-ms: ${DIFY_READ_TIMEOUT_MS:300000}
      preliminary-output-keys:
        output-structured: ${DIFY_PRELIM_OUTPUT_ROOT:output_structured}
        diagnosis-text: ${DIFY_PRELIM_OUTPUT_DIAGNOSIS_TEXT:answer}
        suggested-diseases: ${DIFY_PRELIM_OUTPUT_SUGGESTED_DISEASES:diseaseDetail}
        diagnosis-basis: ${DIFY_PRELIM_OUTPUT_BASIS:}
        confidence: ${DIFY_PRELIM_OUTPUT_CONFIDENCE:}
        parse-json-from-text: true
      w2-output-keys:
        # 若 Dify 结束节点用根变量包裹输出，填变量名；平铺输出可留空
        output-root: ${DIFY_W2_OUTPUT_ROOT:}
      ct-inference-url: ${CT_INFERENCE_URL:}
