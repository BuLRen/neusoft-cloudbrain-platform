# =============================================================================
# physician-service 配置
# 门诊医师微服务：病历、处方、检查检验开立等（纯业务，AI 已拆分至 physician-ai-service）
# =============================================================================

server:
  port: 8092

spring:
  application:
    name: physician-service
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
      - optional:classpath:config/database.yml
      - optional:file:../config/database.yml
      - optional:file:./config/database.yml
      - optional:file:../config/database-secrets.yml
      - optional:file:./config/database-secrets.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        register-enabled: ${NACOS_DISCOVERY_ENABLED:false}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: false
    service-registry:
      auto-registration:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.xikang.physician.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.physician: DEBUG

# 叫号服务：physician-service → registration-service internal 接口
# 本地默认直连 8091；远程 Nacos 部署时设 REGISTRATION_SERVICE_URL=（留空）且 NACOS_DISCOVERY_ENABLED=true
calling:
  service:
    url: ${REGISTRATION_SERVICE_URL:http://localhost:8091}

services:
  # 服务间直连 payment 内部 API；默认同机 8096。分机部署时在 .env 设 PAYMENT_SERVICE_URL=http://<payment可达IP>:8096
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://127.0.0.1:8096}
  medtech-service:
    url: ${MEDTECH_SERVICE_URL:http://localhost:8093}
  ct-viewer-service:
    url: ${CT_VIEWER_SERVICE_URL:http://localhost:8099}
    internal-token: ${INTERNAL_SERVICE_TOKEN:${INTERNAL_AI_TOKEN:}}
  # 通知服务：开单后给患者发"待缴费"通知
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8200}
    internal-token: ${NOTIF_INTERNAL_TOKEN:notif-internal-2026}

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

xikang:
  internal:
    ai:
      token: ${INTERNAL_AI_TOKEN:}
