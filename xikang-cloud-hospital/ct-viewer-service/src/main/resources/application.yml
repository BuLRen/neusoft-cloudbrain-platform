server:
  port: 8099

spring:
  application:
    name: ct-viewer-service
  config:
    import:
      - optional:file:../.env
      - optional:file:./.env
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 2GB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.xikang.ctviewer: DEBUG

ct-viewer:
  work-dir: ${CT_VIEWER_WORK_DIR:./data/ct-viewer}
  volume-ttl-seconds: ${CT_VIEWER_VOLUME_TTL:7200}
  cleanup-interval-ms: 300000
  algo:
    base-url: ${CT_VIEWER_ALGO_URL:http://127.0.0.1:8106}
    connect-timeout-ms: 30000
    read-timeout-ms: 600000
