        '200':
          description: OK
  /api/physician/agent/tools/run-w5:
    post:
      operationId: tool_run_w5
      summary: W5 智能荐药
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
        - name: doctor_id
          in: query
          required: false
