  /api/physician/agent/tools/draft-medical-record:
    post:
      operationId: tool_draft_medical_record
      summary: 生成病历修改草案（不写库）
      description: 生成病历草案并返回 diff 与 confirmPayload。补充预问诊到病历时，merge_from_preconsultation 必须为 true。
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
          description: 就诊号，必须使用 Agent 输入变量 register_id
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
        - name: merge_from_preconsultation
          in: query
          required: false
          schema:
            type: boolean
          description: 为 true 时自动从 AI 预问诊摘要合并字段
        - name: readme
          in: query
          required: false
          schema:
            type: string
          description: 主诉
        - name: present
          in: query
          required: false
          schema:
            type: string
          description: 现病史
        - name: present_treat
          in: query
          required: false
          schema:
            type: string
          description: 现病治疗情况
        - name: history
          in: query
          required: false
          schema:
            type: string
          description: 既往史
        - name: allergy
          in: query
          required: false
          schema:
            type: string
          description: 过敏史
        - name: physique
          in: query
          required: false
          schema:
            type: string
          description: 体格检查
        - name: proposal
          in: query
          required: false
          schema:
            type: string
          description: 检查检验建议
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/draft-order-basket:
    post:
      operationId: tool_draft_order_basket
      summary: 生成检查检验申请篮草案
      description: 推荐优先用 use_w2=true 从 W2 结果生成，避免直接传复杂 items。
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
        - name: order_type
          in: query
          required: false
          schema:
            type: string
            enum: [check, inspection, disposal]
        - name: use_w2
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
