openapi: 3.1.0
info:
  title: Xikang Physician Agent Tools v3.1 for Dify
  description: Dify 导入专用版本。使用 query parameters 暴露工具参数，避免部分 Dify 版本无法解析 requestBody 参数。
  version: 3.1.0
servers:
  - url: http://172.17.0.1:8092
paths:
  /api/physician/agent/tools/run-preliminary-diagnosis:
    post:
      operationId: tool_run_preliminary_diagnosis
      summary: 运行 AI 初步诊断
      description: 读取当前就诊病历与预问诊，调用初步诊断工作流。
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
          description: 就诊号，必须使用 Agent 输入变量 register_id
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
          description: 当前医生 ID
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: Copilot 会话 ID
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/run-w1:
    post:
      operationId: tool_run_w1
      summary: 病历结构化 W1
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/run-w2:
    post:
      operationId: tool_run_w2
      summary: W2 检查检验推荐
      parameters:
        - name: register_id
          in: query
