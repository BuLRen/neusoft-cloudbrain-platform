          schema:
            type: string
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/run-w3:
    post:
      operationId: tool_run_w3
      summary: W3 结果解读
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/run-w4:
    post:
      operationId: tool_run_w4
      summary: W4 门诊确诊
      parameters:
        - name: register_id
          in: query
