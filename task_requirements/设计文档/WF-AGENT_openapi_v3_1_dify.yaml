          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
        - name: confirmation_token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/commit-medical-record:
