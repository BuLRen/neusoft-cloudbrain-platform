          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
        - name: tech_type
          in: query
          required: false
          schema:
            type: string
            enum: [check, inspection, disposal]
          description: 医技类型
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: 搜索关键词
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/get-diseases:
