          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
        - name: use_w4
          in: query
          required: false
          schema:
            type: boolean
        - name: diagnosis
          in: query
          required: false
          schema:
            type: string
        - name: cure
          in: query
          required: false
          schema:
            type: string
        - name: careful
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/draft-prescription:
    post:
      operationId: tool_draft_prescription
      summary: 生成处方草案
      description: 推荐优先用 use_w5=true 从 W5 荐药结果生成，避免直接传复杂 items。
      parameters:
        - name: register_id
          in: query
          required: true
          schema:
            type: string
        - name: doctor_id
          in: query
          required: false
          schema:
            type: string
        - name: session_id
          in: query
          required: false
          schema:
            type: string
        - name: use_w5
          in: query
          required: false
          schema:
            type: boolean
        - name: confirmed_diagnosis
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/physician/agent/tools/draft-preliminary-diagnosis:
